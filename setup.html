<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>showup — setup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@800&family=Fraunces:opsz,wght@9..144,700&family=Inter:wght@400;500;600&family=Caveat:wght@600&family=Fredoka+One&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/base.css" />

<body>

  <div id="setup-container">
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div id="step-label">Step 1 of 1</div>

    <!-- STEP 1: Display Name -->
    <div class="step" id="step-1">
      <h2>What should we call you?</h2>
      <p>This is how your name will appear on the tracker.</p>
      <input type="text" id="display-name-input" placeholder="e.g. Jen" maxlength="20" />
    </div>

    <!-- NAVIGATION -->
    <div id="step-nav">
      <button id="next-btn">Next →</button>
    </div>
  </div>

  <script type="module" src="js/setup.js"></script>
