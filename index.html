<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>showup</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="login-screen">
    <h1>showup.</h1>
    <p>Track your workouts. Keep each other accountable.</p>
    <button id="google-signin-btn">Sign in with Google</button>
  </div>

  <!-- MAIN APP (hidden until logged in) -->
  <div id="app-screen" style="display:none;">
    <header>
      <h1>showup.</h1>
      <div id="user-info">
        <span id="user-name"></span>
        <button id="signout-btn">Sign out</button>
      </div>
    </header>
    <main id="tracker-container">
      <!-- Tracker grid will be built here -->
    </main>
  </div>

  <script type="module">
    import { signIn, signOutUser, onAuthReady, hasCompletedSetup } from "./js/auth.js";

    const loginScreen = document.getElementById("login-screen");
    const appScreen = document.getElementById("app-screen");
    const userName = document.getElementById("user-name");

    document.getElementById("google-signin-btn").addEventListener("click", signIn);
    document.getElementById("signout-btn").addEventListener("click", signOutUser);

    onAuthReady(async (user) => {
      if (user) {
        // User is logged in
        const setupDone = await hasCompletedSetup(user.uid);
        if (!setupDone) {
          // First time — go to setup
          window.location.href = "setup.html";
        } else {
          // Show main app
          loginScreen.style.display = "none";
          appScreen.style.display = "block";
          userName.textContent = user.displayName;
        }
      } else {
        // Not logged in — show login screen
        loginScreen.style.display = "block";
        appScreen.style.display = "none";
      }
    });
  </script>

</body>
</html>
