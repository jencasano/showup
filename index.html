<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>showup.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@800&family=Fraunces:opsz,wght@9..144,700&family=Inter:wght@400;500;600&family=Caveat:wght@600&family=Fredoka+One&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/login.css" />
  <link rel="stylesheet" href="css/tracker.css" />
  <link rel="stylesheet" href="css/cal-card.css" />
  <link rel="stylesheet" href="css/modals.css" />
  <link rel="stylesheet" href="css/ui.css" />
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="login-screen" style="display:none;">
    <div class="login-logo">show<span>up</span>.</div>
    <p class="login-tagline">Track your workouts. Keep each other accountable.</p>
    <p class="login-sub">Sign in to see who showed up this month.</p>
    <button id="google-signin-btn">Sign in with Google</button>
    <div class="login-dots">
      <div class="login-dot filled"></div>
      <div class="login-dot teal"></div>
      <div class="login-dot"></div>
      <div class="login-dot filled"></div>
      <div class="login-dot"></div>
      <div class="login-dot teal"></div>
      <div class="login-dot filled"></div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app-screen" style="display:none;">

    <!-- HEADER -->
    <header>
      <h1>show<span>up</span>.</h1>
      <div id="user-info">
        <span id="user-name"></span>
        <button id="theme-toggle" title="Toggle dark mode">🌙</button>
        <button id="signout-btn">Sign out</button>
      </div>
    </header>

    <!-- TAB ROW -->
    <div id="tab-row">
      <nav id="main-tabs">
        <button class="tab-btn active" data-tab="mylog">My Log</button>
        <button class="tab-btn" data-tab="following">Following</button>
        <button class="tab-btn" data-tab="all">All</button>
      </nav>
    </div>

    <!-- MONTH BAR -->
    <div id="month-bar">
      <button id="prev-month-btn">←</button>
      <span id="current-month-label">April 2026</span>
      <button id="next-month-btn">→</button>
      <button id="cal-picker-btn">📅</button>
      <div id="month-bar-spacer"></div>
      <div id="month-bar-stat"></div>
    </div>

    <!-- MAIN CONTENT -->
    <main id="app-content">
      <div id="tab-mylog" class="tab-panel"></div>
      <div id="tab-following" class="tab-panel" style="display:none;"></div>
      <div id="tab-all" class="tab-panel" style="display:none;"></div>
    </main>

    <!-- MOBILE BOTTOM NAV -->
    <nav id="bottom-nav">
      <button class="bottom-tab active" data-tab="mylog">
        <span class="bottom-tab-icon">👤</span>
        <span>My Log</span>
      </button>
      <button class="bottom-tab" data-tab="following">
        <span class="bottom-tab-icon">❤️</span>
        <span>Following</span>
      </button>
      <button class="bottom-tab" data-tab="all">
        <span class="bottom-tab-icon">🌍</span>
        <span>All</span>
      </button>
    </nav>

  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
