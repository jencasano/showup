<!DOCTYPE html>
<html lang="en" data-theme="side-a">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>showup.</title>
  <script>
    // Set data-theme before first paint so Side B users don't see a flash of Side A.
    // Mirrors the migration logic in js/app.js; keep them in sync.
    (function () {
      try {
        var raw = localStorage.getItem("theme");
        var migrated = { light: "side-a", dark: "side-b" }[raw] || raw;
        var theme = (migrated === "side-a" || migrated === "side-b") ? migrated : "side-a";
        document.documentElement.setAttribute("data-theme", theme);
      } catch (e) { /* localStorage blocked — default side-a already on <html> */ }
    })();
  </script>
  <link rel="icon" type="image/svg+xml" href="/assets/icons/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@800&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700&family=Caveat:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&family=Fredoka+One&family=Playfair+Display:wght@700&family=Pixelify+Sans:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/login.css" />
  <link rel="stylesheet" href="css/tracker.css" />
  <link rel="stylesheet" href="css/diary-book.css" />
  <link rel="stylesheet" href="css/feed-view.css" />
  <link rel="stylesheet" href="css/cal-card.css" />
  <link rel="stylesheet" href="css/modals.css" />
  <link rel="stylesheet" href="css/ui.css" />
  <link rel="stylesheet" href="css/month-picker.css" />
  <link rel="stylesheet" href="css/icons.css" />
  <link rel="stylesheet" href="css/privacy-settings.css" />
  <link rel="stylesheet" href="css/following.css" />
  <script src="https://unpkg.com/@lottiefiles/lottie-player@2.0.8/dist/lottie-player.js"></script>
</head>
<body>

  <!-- Ambient texture layer (Mixtape Level 3): grain + drifting warmth + drifting motifs.
       Fixed-position behind all app content per spec §6. -->
  <div class="ambient" aria-hidden="true"></div>

  <!-- LOGIN SCREEN -->
  <div id="login-screen" style="display:none;">
    <div class="login-logo">show<span>up</span>.</div>
    <p class="login-tagline">Show up. Period.</p>
    <p class="login-sub">Sign in to see who showed up this month.</p>
    <button id="google-signin-btn">Sign in with Google</button>
    <div class="login-dots">
      <div class="login-dot filled"></div>
      <div class="login-dot teal"></div>
      <div class="login-dot"></div>
      <div class="login-dot filled"></div>
      <div class="login-dot"></div>
      <div class="login-dot teal"></div>
      <div class="login-dot filled"></div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app-screen" style="display:none;">

    <!-- DESKTOP SIDEBAR (V3 Hybrid 1) -->
    <aside class="sidebar">
      <div class="sb-top">
        <svg class="sb-motif" viewBox="0 0 44 12" fill="none" aria-hidden="true">
          <path class="sb-motif-squiggle" d="M2 6 Q 6 2, 10 6 T 18 6" stroke-width="1.5" stroke-linecap="round" fill="none"/>
          <circle class="sb-motif-dot" cx="24" cy="6" r="1.6"/>
          <path class="sb-motif-star" d="M30 6 l3 -4 l1.5 4 l4 1.5 l-4 1.5 l-1.5 4 l-3 -4 l-4 -1.5 z" opacity="0.7"/>
        </svg>
        <div class="sb-logo">show<span>up</span>.</div>
      </div>
      <nav class="sb-nav">
        <button class="sb-nav-item active" data-tab="mylog"><span class="sb-nav-num">01</span>My log</button>
        <button class="sb-nav-item" data-action="diary"><span class="sb-nav-num">02</span>Diary</button>
        <button class="sb-nav-item" data-tab="following"><span class="sb-nav-num">03</span>Following</button>
        <button class="sb-nav-item" data-tab="all"><span class="sb-nav-num">04</span>All</button>
        <button class="sb-nav-item" data-action="shop"><span class="sb-nav-num">05</span>Shop</button>
        <button class="sb-nav-item" data-action="settings"><span class="sb-nav-num">06</span>Settings</button>
      </nav>
      <div class="sb-foot">
        <div class="sb-user-chip">
          <span class="sb-avatar" id="sb-avatar"></span>
          <span class="sb-user-name" id="sb-user-name"></span>
        </div>
        <div class="sb-foot-actions">
          <button id="sb-privacy-btn" class="sb-foot-btn" type="button" title="Update your privacy settings">Privacy</button>
          <button id="sb-signout-btn" class="sb-foot-btn" type="button">Sign out</button>
        </div>
        <div class="theme-pill" role="group" aria-label="Theme">
          <button class="theme-pill-seg" type="button" data-theme-set="side-a" aria-pressed="true" aria-label="Side A (light)" title="Side A">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="4"/>
              <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
            </svg>
          </button>
          <button class="theme-pill-seg" type="button" data-theme-set="side-b" aria-pressed="false" aria-label="Side B (dark)" title="Side B">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- MAIN COLUMN (everything right of sidebar on desktop; full width on mobile) -->
    <div class="main-col">

      <!-- HEADER (mobile only; hidden on desktop) -->
      <header>
        <h1>show<span>up</span>.</h1>
        <div class="header-actions">
          <button class="header-icon-btn" id="header-shop-btn" title="Shop" aria-label="Shop">
            <img src="assets/icons/shop.svg" width="20" height="20" alt="" draggable="false" class="showup-icon" />
          </button>
          <div class="theme-pill theme-pill--header" role="group" aria-label="Theme">
            <button class="theme-pill-seg" type="button" data-theme-set="side-a" aria-pressed="true" aria-label="Side A (light)" title="Side A">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="4"/>
                <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
              </svg>
            </button>
            <button class="theme-pill-seg" type="button" data-theme-set="side-b" aria-pressed="false" aria-label="Side B (dark)" title="Side B">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
              </svg>
            </button>
          </div>
          <button class="header-avatar-btn" id="header-avatar-btn" aria-label="Account menu" aria-expanded="false">
            <span class="header-avatar-initial" id="header-avatar-initial"></span>
          </button>
        </div>
        <!-- Mobile account menu popover (opens from avatar tap) -->
        <div class="avatar-menu" id="avatar-menu" hidden>
          <div class="avatar-menu-user">
            <span class="avatar-menu-avatar" id="avatar-menu-avatar"></span>
            <span class="avatar-menu-name" id="user-name"></span>
          </div>
          <div class="avatar-menu-actions">
            <button id="privacy-settings-btn" class="avatar-menu-item">Privacy</button>
            <button id="signout-btn" class="avatar-menu-item">Sign out</button>
          </div>
          <div class="avatar-menu-footer">more coming soon.</div>
        </div>
      </header>

      <!-- TAB ROW (legacy; hidden on desktop since sidebar replaces it) -->
      <div id="tab-row">
        <nav id="main-tabs">
          <button class="tab-btn active" data-tab="mylog">Mine</button>
          <button class="tab-btn" data-tab="following">Following</button>
          <button class="tab-btn" data-tab="all">All</button>
        </nav>
      </div>

      <!-- MONTH BAR -->
      <div id="month-bar">
        <button id="prev-month-btn">←</button>
        <span id="current-month-label">April 2026</span>
        <button id="next-month-btn">→</button>
        <button id="cal-picker-btn" title="Jump to month"><img src="/assets/icons/calendar.svg" width="20" height="20" alt="calendar" draggable="false" class="showup-icon" /></button>
        <button id="today-btn" title="" hidden>🎯</button>
        <div id="month-bar-spacer"></div>
        <div id="month-bar-stat"></div>
      </div>

      <!-- MAIN CONTENT -->
      <main id="app-content">
        <div id="tab-mylog" class="tab-panel"></div>
        <div id="tab-following" class="tab-panel" style="display:none;"></div>
        <div id="tab-all" class="tab-panel" style="display:none;"></div>
      </main>

      <!-- MOBILE BOTTOM NAV (M3 variant: Mine · Diary · Following · All) -->
      <nav id="bottom-nav">
        <button class="bottom-tab active" data-tab="mylog">
          <img src="assets/icons/my-log.svg" class="bottom-tab-icon showup-icon" width="24" height="24" alt="" draggable="false" />
          <span>mine</span>
        </button>
        <button class="bottom-tab" data-action="diary">
          <img src="assets/icons/diary.svg" class="bottom-tab-icon showup-icon" width="24" height="24" alt="" draggable="false" />
          <span>diary</span>
        </button>
        <button class="bottom-tab" data-tab="following">
          <img src="assets/icons/following.svg" class="bottom-tab-icon showup-icon" width="24" height="24" alt="" draggable="false" />
          <span>following</span>
        </button>
        <button class="bottom-tab" data-tab="all">
          <img src="assets/icons/all.svg" class="bottom-tab-icon showup-icon" width="24" height="24" alt="" draggable="false" />
          <span>all</span>
        </button>
      </nav>

    </div>
  </div>

  <button id="back-to-top" class="back-to-top" aria-label="Back to top">&#x2303;</button>
  <script>
    (() => {
      const btn = document.getElementById('back-to-top');
      let ticking = false;
      window.addEventListener('scroll', () => {
        if (!ticking) {
          requestAnimationFrame(() => {
            btn.classList.toggle('visible', window.scrollY > 300);
            ticking = false;
          });
          ticking = true;
        }
      }, { passive: true });
      btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
    })();
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
